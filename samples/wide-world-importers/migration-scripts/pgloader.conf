LOAD DATABASE
    FROM mssql://sa:Str0ngP@ssw0rd!@localhost:1433/WideWorldImporters
    INTO postgresql://wwi_user:Str0ngP@ssw0rd!@localhost:5432/wide_world_importers

WITH
    include drop,
    create tables,
    create indexes,
    reset sequences,
    downcase identifiers

SET
    maintenance_work_mem to '512MB',
    work_mem to '64MB'

CAST
    -- String types: T-SQL Unicode strings to PG native text
    type nvarchar to text using remove-null-characters,
    type nchar to char,
    type ntext to text using remove-null-characters,
    type varchar to text using remove-null-characters,

    -- Boolean: BIT to BOOLEAN
    type bit to boolean using sql-server-bit-to-boolean,

    -- Numeric: DECIMAL/MONEY to NUMERIC
    type decimal to numeric,
    type money to numeric,
    type smallmoney to numeric,

    -- Date/Time: always timezone-aware
    type datetime to timestamptz,
    type datetime2 to timestamptz,
    type smalldatetime to timestamptz,
    type datetimeoffset to timestamptz,

    -- UUID
    type uniqueidentifier to uuid,

    -- Binary
    type varbinary to bytea,
    type image to bytea,

    -- Special types (require post-migration handling)
    -- HIERARCHYID -> stored as TEXT, migrate to ltree extension later
    type hierarchyid to text,
    -- GEOGRAPHY -> requires PostGIS, stored as text initially
    type geography to text

BEFORE LOAD DO
    $$ CREATE EXTENSION IF NOT EXISTS ltree; $$,
    $$ CREATE EXTENSION IF NOT EXISTS postgis; $$,
    $$ CREATE EXTENSION IF NOT EXISTS pgaudit; $$;
