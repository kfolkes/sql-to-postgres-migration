services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wwi-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Str0ngP@ssw0rd!}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./data:/backup
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${SA_PASSWORD:-Str0ngP@ssw0rd!}" -C -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgis/postgis:16-3.4
    container_name: wwi-postgres
    environment:
      POSTGRES_DB: wide_world_importers
      POSTGRES_USER: wwi_user
      POSTGRES_PASSWORD: "${PG_PASSWORD:-Str0ngP@ssw0rd!}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: pg_isready -U wwi_user -d wide_world_importers
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  sqlserver-data:
  postgres-data:
