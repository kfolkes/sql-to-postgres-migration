# Reusable pgLoader Configuration Template
#
# Replace placeholders:
#   {{SOURCE_HOST}} - SQL Server hostname
#   {{SOURCE_DB}} - Source database name
#   {{TARGET_HOST}} - PostgreSQL hostname
#   {{TARGET_DB}} - Target database name
#   {{TARGET_USER}} - PostgreSQL username

LOAD DATABASE
    FROM mssql://sa:{{SOURCE_PASSWORD}}@{{SOURCE_HOST}}/{{SOURCE_DB}}
    INTO postgresql://{{TARGET_USER}}:{{TARGET_PASSWORD}}@{{TARGET_HOST}}/{{TARGET_DB}}

WITH
    include drop,
    create tables,
    create indexes,
    reset sequences,
    downcase identifiers

SET
    maintenance_work_mem to '512MB',
    work_mem to '64MB'

CAST
    type nvarchar to text using remove-null-characters,
    type nchar to char,
    type ntext to text using remove-null-characters,
    type varchar to text using remove-null-characters,
    type bit to boolean using sql-server-bit-to-boolean,
    type decimal to numeric,
    type money to numeric,
    type datetime to timestamptz,
    type datetime2 to timestamptz,
    type uniqueidentifier to uuid,
    type varbinary to bytea,
    type image to bytea,
    type hierarchyid to text,
    type geography to text

BEFORE LOAD DO
    $$ CREATE EXTENSION IF NOT EXISTS ltree; $$,
    $$ CREATE EXTENSION IF NOT EXISTS postgis; $$,
    $$ CREATE EXTENSION IF NOT EXISTS pgaudit; $$;
